name: Feature request
description: Suggest an improvement for children's typing practice.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: need
    attributes:
      label: What learning need would this support?
      description: Explain the child's practice goal and why the current game is not enough.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
    validations:
      required: true
